<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300">
  <filter id="paper">
    <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" stitchTiles="stitch" result="noise"/>
    <feDiffuseLighting in="noise" lighting-color="#F5F1EA" surfaceScale="0.8" result="diffLight">
      <feDistantLight azimuth="45" elevation="60"/>
    </feDiffuseLighting>
  </filter>
  <rect width="100%" height="100%" filter="url(#paper)"/>
</svg>
